"$schema" = 'https://starship.rs/config-schema.json'

# A continuation prompt that displays two filled-in arrows
continuation_prompt = '▶▶ '

format = """
$os\
[](bg:#769ff0 fg:#a3aed2)\

$directory\
[](fg:#769ff0 bg:#394260)\

$git_branch\
$git_status\
[](fg:#394260 bg:#212736)\

$nodejs\
$rust\
$golang\
$php\
[](fg:#212736)\

\n$character"""

right_format = """
$time\
"""

[os]
disabled=false
format="[ ($type) ]($style)"
style="fg:#769ff0 bg:#a3aed2"

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"
truncate_to_repo = false

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = ""
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'

[nodejs]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[rust]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[golang]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[php]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[time]
disabled = false
format = "[ $time]($style)"
time_format = "%R"
utc_time_offset = "local"
style = "italic dimmed white"
