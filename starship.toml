"$schema" = 'https://starship.rs/config-schema.json'

# A continuation prompt that displays two filled-in arrows
continuation_prompt = '‚Ė∂‚Ė∂ '

format = """
$os\
[Óāį](bg:#769ff0 fg:#a3aed2)\

$directory\
[Óāį](fg:#769ff0 bg:#394260)\

$git_branch\
$git_status\
[Óāį](fg:#394260 bg:#212736)\

$nodejs\
$rust\
$golang\
$php\
